name: Package and release to CurseForge
on:
  push:
    tags: ['*']
permissions:
  contents: read
jobs:
  curseforge:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }   # full history for the auto changelog
      - uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}   # CurseForge ONLY on purpose
